# enforcement.conf — Patterns de debug por linguagem
# Cada linha e um pattern regex (formato grep -E)
# Linhas vazias e comentarios (#) sao ignorados
# O hook pre-commit usa estes patterns para detectar debug statements

# Python
print\(
pdb\.set_trace
breakpoint\(\)
import pdb
import ipdb

# JavaScript / TypeScript
console\.log
console\.debug
console\.warn
console\.error
console\.info
console\.trace
debugger

# Dart / Flutter
debugPrint\(

# Ruby
binding\.pry
byebug

# Go
fmt\.Print
log\.Print

# Rust
println!\(
dbg!\(

# Java / Kotlin
System\.out\.print
